<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Ma'am</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(120deg, #ffd6e0, #fff1f5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* Soft floating flowers */
.flower {
    position: fixed;
    bottom: -30px;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
    opacity: 0.7;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* Card Design */
.card {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 25px;
    width: 380px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    animation: fadeIn 2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

h1 {
    color: #ff4d6d;
    font-size: 28px;
}

p {
    color: #444;
    font-size: 16px;
    line-height: 1.5;
}

/* Photo Frame */
.photo {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 4px solid #ffb3c6;
    margin: 15px auto;
    overflow: hidden;
}

.photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Button */
.btn {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #e63950;
}

/* Signature */
.signature {
    margin-top: 10px;
    font-weight: bold;
    color: #555;
}
</style>

</head>

<body>

<!-- 🎶 Music -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=happy-birthday-to-you-piano-version-117459.mp3" type="audio/mp3">
</audio>

<!-- 🌸 Flower Animation -->
<script>
function createFlower() {
    const flower = document.createElement("div");
    flower.classList.add("flower");
    flower.innerHTML = ["🌸","🌺","💮","🌷","🌹"][Math.floor(Math.random()*5)];
    flower.style.left = Math.random()*100 + "vw";
    flower.style.fontSize = (Math.random()*40 + 30) + "px";
    flower.style.animationDuration = (Math.random()*6 + 8) + "s";

    document.body.appendChild(flower);

    setTimeout(() => {
        flower.remove();
    }, 12000);
}

setInterval(createFlower, 400);
</script>

<div class="card">

    <h1>🎉 Happy Birthday 🎂</h1>

    <!-- 📸 PHOTO SPACE (PUT YOUR IMAGE LINK HERE) -->
    <div class="photo">
        <img src="YOUR_IMAGE_LINK_HERE" alt="Ma'am Photo">
    </div>

    <p><b>Dear Ma'am,</b></p>

    <p>
        Your kindness, patience, and wisdom have always inspired us.  
        You are not just a teacher, but a guiding light in our journey.
    </p>

    <p>
        May your life be filled with happiness, success,  
        and beautiful moments. 🌸
    </p>

    <div class="signature">
        — From your student 💖
    </div>

    <button class="btn" onclick="startSurprise()">Click for Surprise 🎁</button>

</div>

<script>
function startSurprise(){
    document.getElementById("music").play();
    alert("Wishing you a truly wonderful birthday, Ma'am! 💖");
}
</script>

</body>
</html>
